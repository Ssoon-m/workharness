name: Release
run-name: ${{ format('release {0}', github.ref_name) }}

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "22.14.0"
  PNPM_VERSION: "10.30.3"
  ROOT_PACKAGE: "phaseharness"
  CREATE_PACKAGE: "create-phaseharness"

jobs:
  validate:
    if: github.repository == 'Ssoon-m/phaseharness'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure tagged commit is on main
        run: |
          set -euo pipefail
          git fetch origin main --depth=1

          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Release tag must point to a commit on main."
            exit 1
          fi

      - name: Ensure tag version matches package versions
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG_NAME#v}"
          ROOT_VERSION=$(node -p "require('./package.json').version")
          CREATE_VERSION=$(node -p "require('./packages/create-phaseharness/package.json').version")

          if [[ "${VERSION}" != "${ROOT_VERSION}" ]]; then
            echo "Tag version ${VERSION} does not match package.json version ${ROOT_VERSION}."
            exit 1
          fi

          if [[ "${VERSION}" != "${CREATE_VERSION}" ]]; then
            echo "Tag version ${VERSION} does not match packages/create-phaseharness/package.json version ${CREATE_VERSION}."
            exit 1
          fi

      - name: Run release validation
        run: pnpm run release:check

  publish:
    if: github.repository == 'Ssoon-m/phaseharness'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Calculate release metadata
        id: release_meta
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG_NAME#v}"

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${VERSION}"
            exit 1
          fi

          DIST_TAG=""
          if [[ "${VERSION}" == *-* ]]; then
            DIST_TAG=$(printf '%s' "${VERSION#*-}" | cut -d'.' -f1)
            DIST_TAG=${DIST_TAG:-next}
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dist_tag=${DIST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Ensure versions are not already published
        env:
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail

          for PACKAGE_NAME in "${ROOT_PACKAGE}" "${CREATE_PACKAGE}"; do
            if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "${PACKAGE_NAME}@${VERSION} is already published on npm."
              exit 1
            fi
          done

      - name: Verify package contents
        run: pnpm run release:check

      - name: Pack release tarballs
        env:
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p /tmp/phaseharness-publish
          pnpm pack --pack-destination /tmp/phaseharness-publish
          pnpm --dir packages/create-phaseharness pack --pack-destination /tmp/phaseharness-publish

          test -f "/tmp/phaseharness-publish/${ROOT_PACKAGE}-${VERSION}.tgz"
          test -f "/tmp/phaseharness-publish/${CREATE_PACKAGE}-${VERSION}.tgz"

      - name: Publish packages
        env:
          VERSION: ${{ steps.release_meta.outputs.version }}
          DIST_TAG: ${{ steps.release_meta.outputs.dist_tag }}
        run: |
          set -euo pipefail

          if [[ -n "${DIST_TAG}" ]]; then
            TAG_ARGS=(--tag "${DIST_TAG}")
          else
            TAG_ARGS=()
          fi

          npm publish "/tmp/phaseharness-publish/${ROOT_PACKAGE}-${VERSION}.tgz" --provenance --access public "${TAG_ARGS[@]}"
          npm publish "/tmp/phaseharness-publish/${CREATE_PACKAGE}-${VERSION}.tgz" --provenance --access public "${TAG_ARGS[@]}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release view "${TAG_NAME}" >/dev/null 2>&1 || \
            gh release create "${TAG_NAME}" --title "${TAG_NAME}" --generate-notes
